name: Signal Bot

on:
  schedule:
    - cron: "*/15 * * * *"   # elke 15 minuten -- alleen commando's zijn dan snel, de zware scan zit los ingebouwd in het script (AUTO_CHECK_INTERVAL_HOURS)
  workflow_dispatch: {}       # laat je 'm ook handmatig starten via de GitHub-website

permissions:
  contents: write            # nodig om de state-bestanden (tracked lijst, etc.) terug te committen

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Repo uitchecken
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installeren
        run: pip install yfinance ta requests matplotlib lxml

      - name: Bot draaien
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signal_bot.py

      - name: State-bestanden terug opslaan in de repo
        run: |
          git config user.name "signal-bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add signal_bot_state.json tracked_tickers.json telegram_offset.json last_auto_run.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update bot state [skip ci]"
          git push || true
